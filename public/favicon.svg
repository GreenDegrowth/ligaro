<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            @media (prefers-color-scheme: dark) {
            .favicon-bg { fill: #0a0a0a; }
            .favicon-line { stroke: #e5e5e5; }
            }
            @media (prefers-color-scheme: light) {
            .favicon-bg { fill: #ffffff; }
            .favicon-line { stroke: #1a1a1a; }
            }
        </style>
    </defs>

    <rect class="favicon-bg" width="64" height="64" />

    <!-- Abstract geometric pattern: interlocking lines forming a modern, minimalist design -->
    <g class="favicon-line" stroke-width="2" fill="none" stroke-linecap="round"
        stroke-linejoin="round">
        <!-- Left vertical line -->
        <line x1="16" y1="12" x2="16" y2="52" />

        <!-- Right vertical line -->
        <line x1="48" y1="12" x2="48" y2="52" />

        <!-- Top horizontal line -->
        <line x1="16" y1="20" x2="48" y2="20" />

        <!-- Middle horizontal line -->
        <line x1="16" y1="32" x2="48" y2="32" />

        <!-- Bottom horizontal line -->
        <line x1="16" y1="44" x2="48" y2="44" />

        <!-- Diagonal accent lines for visual interest -->
        <line x1="24" y1="12" x2="32" y2="28" />
        <line x1="40" y1="36" x2="32" y2="52" />
    </g>
</svg>
